name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linguafoundry
          POSTGRES_DB: linguafoundry_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linguafoundry -d linguafoundry_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install project dependencies when present
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [[ -f pyproject.toml ]]; then
            python -m pip install -e .
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          else
            echo "No project dependency manifest found; scaffold dependency install skipped."
          fi

      - name: Install CI quality tools
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r requirements-dev.txt

      - name: Check Markdown formatting
        shell: bash
        run: |
          set -euo pipefail
          find . -path ./.git -prune -o \
            -path './.github/ISSUE_TEMPLATE/*' -prune -o \
            -name '*.md' -print0 \
            | xargs -0 mdformat --check

      - name: Run Ruff when Python files exist
        shell: bash
        run: |
          set -euo pipefail
          if find . -path ./.git -prune -o -name '*.py' -print -quit | grep -q .; then
            ruff format --check .
            ruff check .
          else
            echo "No Python files found; Ruff checks skipped."
          fi

      - name: Run tests when present
        shell: bash
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://linguafoundry@localhost:5432/linguafoundry_test
        run: |
          set -euo pipefail
          if find . -path ./.git -prune -o \
            \( -path './tests' -o -path '*/tests' -o -name 'test_*.py' -o -name '*_test.py' \) \
            -print -quit | grep -q .; then
            pytest
          else
            echo "No tests found; pytest skipped."
          fi

      - name: Scan for committed secrets
        shell: bash
        run: |
          set -euo pipefail
          detect-secrets scan --all-files \
            --exclude-files '^\.git/' \
            --exclude-files '^\.pytest_cache/' \
            --exclude-files '^\.ruff_cache/' \
            > /tmp/detect-secrets.json

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("/tmp/detect-secrets.json").read_text())
          findings = report.get("results", {})

          if not findings:
              print("No committed secrets detected.")
              sys.exit(0)

          print("Potential committed secrets detected:")
          for file_name, file_findings in sorted(findings.items()):
              lines = ", ".join(str(item["line_number"]) for item in file_findings)
              print(f"- {file_name}: line(s) {lines}")
          sys.exit(1)
          PY
