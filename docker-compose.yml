services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linguafoundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linguafoundry}
      POSTGRES_DB: ${POSTGRES_DB:-linguafoundry}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-linguafoundry}:${POSTGRES_PASSWORD:-linguafoundry}@db:5432/${POSTGRES_DB:-linguafoundry}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      API_KEY: ${API_KEY:-}
      SEED_LANG_PACKS: ${SEED_LANG_PACKS:-true}
      SEED_LANG_PACK_PATHS: ${SEED_LANG_PACK_PATHS:-packages/lang-packs/examples}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  bot:
    build:
      context: .
      dockerfile: services/bot/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: http://api:8000
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TELEGRAM_POLL_TIMEOUT: ${TELEGRAM_POLL_TIMEOUT:-30}
      API_READY_TIMEOUT_SECONDS: ${API_READY_TIMEOUT_SECONDS:-60}
      API_READY_INTERVAL_SECONDS: ${API_READY_INTERVAL_SECONDS:-2}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
